<script>
const LINE_ADD_URL="https://lin.ee/8RijcLR";
const results=[{id:1,name:"完璧主義者型",subtitle:"理解を固めすぎて進まないタイプ",emoji:"📐",tagline:"丁寧さは武器です。ただし、国試では“完璧”より“回し切る力”が点になります。",overview:"あなたは雑に進めるのが苦手で、ちゃんと理解してから次に進みたいタイプです。ノートや整理は上手ですが、そのぶん問題演習の回転数が落ちやすい傾向があります。",whyFailed:"勉強量そのものより、1分野にかける時間配分が重くなり、重要分野を全部回す前に時間が足りなくなった可能性が高いです。",repeatRisk:"今年も『理解が甘い気がする』『まだ進まない方が安全』と感じた瞬間に止まりやすいです。止まるたびに全体の周回が遅れます。",deepDive:"1つの分野で図を書き直したりノートを整えたりしているうちに1日が終わる。やった感覚はあるのに、過去問の回転数が増えない状態です。",triggerPoint:"あなたはサボり型ではありません。真面目すぎるから落ちる型です。必要なのは、やる気ではなく、止まれない進め方です。",advice:[{title:"1分野90分で強制終了する",body:"終わっていなくても次へ進み、深掘りは2周目に回します。"},{title:"毎日最初に20問解く",body:"ノート整理より先に問題演習を置いて、試験で使える知識に変えます。"},{title:"70点で前進する",body:"全部理解してからではなく、7割理解で次へ進むルールを固定します。"}],dontDo:["きれいなノート作りに時間を使う","1テーマをその日のうちに完璧にする","理解不足が怖くて過去問を後回しにする"],firstWeekPlan:[{title:"1日目",body:"全科目の優先順位を決め、今月触る範囲を紙1枚に絞る。"},{title:"3日目まで",body:"毎日20問の過去問を先に解き、復習は間違えた箇所だけに限定する。"},{title:"7日目",body:"どこで止まりやすかったかを見て、90分ルールを守れたか確認する。"}],ctaTitle:"完璧主義で止まりやすい人向けに、勉強順をLINEで整理します",ctaSub:"どこを浅く・どこを深くやるかを、無料相談で切り分けます。",strengths:["理解が丁寧","知識の定着が深い","誤答の原因を言語化しやすい"],watchouts:["進みが遅い","演習量不足","全体を回し切れない"]},{id:2,name:"献身家型",subtitle:"一人だと失速しやすいタイプ",emoji:"🤝",tagline:"誰かとの約束があると強い。逆に、一人戦だと崩れやすいタイプです。",overview:"一人で黙々と進めるより、誰かとの約束や応援があると頑張れるタイプです。完全に一人になるとペースが落ちやすい傾向があります。",whyFailed:"やる気不足ではなく、進捗を見てもらう仕組みがなかったことが原因になりやすいです。",repeatRisk:"今年も『今日は気分が乗らない』『少し遅れても大丈夫』が続くと危険です。誰にも見られていない期間が長くなるほど遅れが大きくなります。",deepDive:"最初は頑張る。でも数日後には『今日はまあいいか』となる。予定がずれても報告先がないから修正も入らない流れです。",triggerPoint:"あなたは意志が弱いのではありません。見てもらう環境があるほど伸びるタイプです。自分を責めるより環境を変えた方が早いです。",advice:[{title:"毎週の報告先を1つ作る",body:"先生でも仲間でもよいので、毎週必ず進捗を見せる場を固定します。"},{title:"勉強前に今日の終了条件を書く",body:"今日終えることを文字にすると着手率が上がります。"},{title:"一人で完結させない",body:"管理される場や時間を意図的に入れた方が結果が出ます。"}],dontDo:["気分だけでその日の勉強量を決める","一人で全部管理しようとする","進捗報告を後回しにする"],firstWeekPlan:[{title:"1日目",body:"毎週報告する相手と曜日を決める。"},{title:"3日目まで",body:"毎日、勉強前に『今日終えること』を3行でメモする。"},{title:"7日目",body:"予定との差を見て、来週の分量を増やすのではなく整える。"}],ctaTitle:"一人だと崩れやすい人向けに、続く勉強の形をLINEで決めます",ctaSub:"今週から回る管理の形を、無料相談で具体化します。",strengths:["応援で伸びる","素直に修正できる","関係性があると継続しやすい"],watchouts:["一人で失速","継続が不安定","予定ずれを放置しやすい"]},{id:3,name:"達成者型",subtitle:"数字と成果で燃えるタイプ",emoji:"🏁",tagline:"数字が見えると強い。ただし、追う数字を間違えると空回りします。",overview:"目標や数字がはっきりすると集中力を出せるタイプです。逆に、何をどこまでやればいいかが曖昧だとズレやすい傾向があります。",whyFailed:"努力不足ではなく、追うべき数字がズレていた可能性があります。勉強時間や冊数ではなく、分野ごとの得点改善が必要です。",repeatRisk:"今年も『今日は何時間やった』『これだけ解いた』で満足すると、点数に変わらない努力を続けやすいです。",deepDive:"勉強時間は取っているのに、模試や過去問で伸びない。やった量は増えるが、復習の精度や穴埋めが甘いまま進む状態です。",triggerPoint:"必要なのは根性ではなく、どこを直せば点数が上がるかを見つけることです。",advice:[{title:"毎週の点数目標を置く",body:"勉強時間ではなく、分野別の何問できたかで追います。"},{title:"誤答を3分類する",body:"知識不足・読解ミス・復習不足に分けて修正先を明確にします。"},{title:"見る数字を3つに絞る",body:"何問できたか、どこでミスしたか、復習したかだけを毎週見ます。"}],dontDo:["勉強時間だけで満足する","教材を終わらせることを目的にする","間違えた理由を記録しない"],firstWeekPlan:[{title:"1日目",body:"苦手3分野を決め、それぞれ目標何問できたかを書く。"},{title:"3日目まで",body:"毎日、解いた問題の誤答理由を3分類で記録する。"},{title:"7日目",body:"分野別に『点になっているか』だけを見て翌週を組み直す。"}],ctaTitle:"頑張っているのに伸びない人向けに、点数が上がる計画をLINEで組み直します",ctaSub:"数字ベースで、今の勉強のズレを無料相談で修正します。",strengths:["集中力が高い","結果志向で動ける","目標が明確だと強い"],watchouts:["やった気になる","見るポイントが雑","点につながらない努力をしやすい"]}];
const questions=[{id:1,text:"勉強しているとき、一番よく起きるのはどれですか？",choices:[{label:"A",text:"理解やノート整理に時間をかけすぎる",typeId:1},{label:"B",text:"誰かに見てもらえないと続きにくい",typeId:2},{label:"C",text:"数字は見ているのに点数に変わりにくい",typeId:3}]},{id:2,text:"勉強計画を立てたあと、実際はどうなりやすいですか？",choices:[{label:"A",text:"理解を優先しすぎて進みが遅くなる",typeId:1},{label:"B",text:"一人だと途中で失速しやすい",typeId:2},{label:"C",text:"やった量は増えるが点数が伸びない",typeId:3}]},{id:3,text:"模試や過去問の結果が悪かったとき、近い反応はどれですか？",choices:[{label:"A",text:"原因を考えすぎて次に進めなくなる",typeId:1},{label:"B",text:"落ち込み、ペースが崩れやすい",typeId:2},{label:"C",text:"数字で見直したくなるが焦って空回りする",typeId:3}]},{id:4,text:"周りから勉強法のアドバイスをもらうと、どう感じますか？",choices:[{label:"A",text:"まず自分で納得してから進みたい",typeId:1},{label:"B",text:"背中を押されると頑張れる",typeId:2},{label:"C",text:"数字や結果で示されると受け入れやすい",typeId:3}]},{id:5,text:"一人で勉強しているとき、止まりやすい原因は？",choices:[{label:"A",text:"完璧にしようとして前に進めない",typeId:1},{label:"B",text:"やることは分かるが続きにくい",typeId:2},{label:"C",text:"何を直せば点数が上がるか曖昧になる",typeId:3}]},{id:6,text:"あなたの強みに一番近いものはどれですか？",choices:[{label:"A",text:"理解を丁寧に積み上げられる",typeId:1},{label:"B",text:"応援や約束があると頑張れる",typeId:2},{label:"C",text:"目標や数字があると集中できる",typeId:3}]},{id:7,text:"去年の失敗を一言で表すなら、近いのはどれですか？",choices:[{label:"A",text:"丁寧にやったが全体を回し切れなかった",typeId:1},{label:"B",text:"続かなかった・崩れた・後回しになった",typeId:2},{label:"C",text:"頑張ったのに点数に変わらなかった",typeId:3}]}];
let screen="start",currentQ=0,answers={};
function getResult(answerMap){const score={};Object.values(answerMap).forEach(t=>{score[t]=(score[t]||0)+1});const winner=Object.entries(score).sort((a,b)=>{const diff=Number(b[1])-Number(a[1]);if(diff!==0)return diff;return Number(a[0])-Number(b[0])})[0]?.[0];return results.find(r=>r.id===Number(winner))||results[0]}
function buildLineMessageText(result){
  return `診断結果は「${result.name}」でした。
今の勉強のズレを相談したいです。

【相談したい内容】
・診断タイプ：${result.name}
・気になった点：${result.triggerPoint}
・第61回の状況：未記入
・今困っていること：未記入`;
}

async function copyLineMessage(result){
  const text = buildLineMessageText(result);
  try{
    await navigator.clipboard.writeText(text);
    alert("相談文をコピーしました。次にLINEを開いて貼り付けてください。");
  }catch(e){
    alert("コピーできませんでした。もう一度お試しください。");
  }
}
function renderHeaderBadge(){document.getElementById("headerBadge").innerHTML=screen!=="start"?'<span class="badge">7問診断</span>':''}
function renderStart(){return `<section class="center"><span class="soft-badge">1分で完了</span><h1>落ちた原因、<br><span class="pink">ズレてるかも。</span></h1><p class="lead">ズレたまま続けると、今年も苦しくなります。</p><p class="sublead">7問に答えるだけで、繰り返しやすい失敗パターンと、今すぐ直すべき勉強行動が分かります。</p></section><section class="grid-3"><div class="card"><div class="card-pad"><div class="icon-box">⚠️</div><div class="card-title">落ちた原因が分かる</div><div class="card-text">勉強不足ではなく、どこでズレたかを特定します。</div></div></div><div class="card"><div class="card-pad"><div class="icon-box">📋</div><div class="card-title">処方箋まで出る</div><div class="card-text">タイプごとに、今すぐ変えるべき勉強行動を提示します。</div></div></div><div class="card"><div class="card-pad"><div class="icon-box">🎯</div><div class="card-title">LINEで相談できる</div><div class="card-text">診断後にそのままLINEで無料相談へ進めます。</div></div></div></section><section class="card"><div class="card-pad center"><div class="types">${results.map(r=>`<div class="type-mini"><div class="emoji">${r.emoji}</div><div class="name">${r.name}</div></div>`).join("")}</div><button class="btn btn-primary" onclick="startQuiz()">無料で原因を特定する →</button></div></section>`}
function renderQuiz(){const q=questions[currentQ];const progress=((currentQ+1)/questions.length)*100;return `<div class="progress-wrap"><div class="container"><div class="progress-meta"><strong>質問 ${currentQ+1} / ${questions.length}</strong><span style="color:#64748b">あと ${questions.length-currentQ-1} 問</span></div><div class="progress"><div style="width:${progress}%"></div></div></div></div><section class="question-card"><div class="card"><div class="card-pad"><div class="question">${q.text}</div><div class="choice-list">${q.choices.map(choice=>`<button class="choice ${choice.label.toLowerCase()}" onclick="selectChoice(${choice.typeId})"><div class="choice-inner"><div class="choice-label">${choice.label}</div><div class="choice-text">${choice.text}</div></div></button>`).join("")}</div><div class="question-footer"><button class="ghost" ${currentQ===0?'disabled style="opacity:.4;cursor:not-allowed"':''} onclick="goBack()">戻る</button><span>直感で選んでください</span></div></div></div></section>`}
function renderResult(){const result=getResult(answers);return `<section class="result-wrap"><div class="result-hero"><div class="result-emoji">${result.emoji}</div><span class="soft-badge">あなたの診断結果</span><div class="result-name">${result.name}</div><div class="result-sub">${result.subtitle}</div><div class="pill">${result.tagline}</div></div><div class="grid-2" style="margin-bottom:16px"><div class="card"><div class="card-pad"><div class="section-title">✅ 強み</div><ul class="list">${result.strengths.map(s=>`<li>${s}</li>`).join("")}</ul></div></div><div class="card"><div class="card-pad"><div class="section-title pink">⚠️ 注意点</div><ul class="list">${result.watchouts.map(s=>`<li>${s}</li>`).join("")}</ul></div></div></div><div style="display:grid;gap:16px;margin-bottom:18px"><div class="card"><div class="card-pad"><div class="section-title">あなたの傾向</div><div class="card-text" style="font-size:15px">${result.overview}</div></div></div><div class="card soft-box-pink"><div class="card-pad"><div class="section-title pink">なぜ落ちたのか</div><div class="card-text" style="font-size:15px">${result.whyFailed}</div></div></div><div class="card soft-box-amber"><div class="card-pad"><div class="section-title amber">今年も繰り返しやすい危険パターン</div><div class="card-text" style="font-size:15px">${result.repeatRisk}</div></div></div><div class="card soft-box-blue"><div class="card-pad"><div class="section-title">こんな場面、ありませんか？</div><div class="card-text" style="font-size:15px">${result.deepDive}</div></div></div></div><div class="card" style="overflow:hidden;margin-bottom:18px"><div class="advice-header">今すぐ直すポイント</div>${result.advice.map((item,i)=>`<div class="advice-item"><div class="advice-row"><div class="advice-num">${i+1}</div><div><div class="card-title" style="margin:0 0 6px">${item.title}</div><div class="card-text">${item.body}</div></div></div></div>`).join("")}</div><div class="grid-2" style="margin-bottom:18px"><div class="card" style="background:#fff1f2;border-color:#fecdd3"><div class="card-pad"><div class="section-title rose">やらない方がいいこと</div><ul class="list">${result.dontDo.map(s=>`<li>${s}</li>`).join("")}</ul></div></div><div class="card" style="background:#ecfdf5;border-color:#bbf7d0"><div class="card-pad"><div class="section-title green">最初の7日でやること</div><ul class="list">${result.firstWeekPlan.map(s=>`<li><strong>${s.title}：</strong>${s.body}</li>`).join("")}</ul></div></div></div><div class="cta card"><div class="card-pad center"><div style="font-size:34px;margin-bottom:10px">🎯</div><div style="font-size:clamp(24px,3vw,34px);font-weight:900;line-height:1.4;margin-bottom:10px">${result.ctaTitle}</div><div style="max-width:680px;margin:0 auto 12px;color:#dbeafe;line-height:1.8">${result.ctaSub}</div><div class="small">※去年と同じやり方のままだと、今年も同じところで苦しくなりやすいです</div><div style="font-size:14px;font-weight:900;color:#dbeafe;margin:8px 0 14px">今のズレは、早いほど直しやすいです</div><div style="font-size:14px;color:#dbeafe;margin-bottom:16px">第61回で落ちた方へ / カウンセリング＆パーソナル学習計画作成 / <span style="text-decoration:line-through;opacity:.8">通常1万円</span><span class="warn"> → 今だけ無料</span></div><div class="helper"><div style="font-weight:800;margin-bottom:6px">LINE追加後に送る内容</div><div>① 診断結果のタイプ名</div><div>② 第61回の自己採点 or 体感</div><div>③ 今困っていること</div></div><div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
  <button class="btn btn-primary" onclick='copyLineMessage(result)'>相談内容をコピーする</button>
  <a class="btn btn-secondary" href="${LINE_ADD_URL}" target="_blank" rel="noopener noreferrer">LINEを追加する</a>
</div><div class="small" style="margin-top:14px">スマホからそのまま送れます / 無料相談に進めます</div></div></div><div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:18px"><button class="btn btn-secondary" onclick="restart()">もう一度診断する</button><a class="btn btn-secondary" href="https://twitter.com/intent/tweet" target="_blank" rel="noopener noreferrer">Xでシェア</a></div></section>`}
function render(){
  renderHeaderBadge();
  const app = document.getElementById("app");
  const bottomBar = document.getElementById("bottomBar");

  if(screen === "start") app.innerHTML = renderStart();
  if(screen === "quiz") app.innerHTML = renderQuiz();
  if(screen === "result") app.innerHTML = renderResult();

  if (bottomBar) {
    bottomBar.style.display = screen === "result" ? "block" : "none";
  }

  window.scrollTo({ top: 0, behavior: "smooth" });
}
function startQuiz(){screen="quiz";currentQ=0;answers={};render()} function restart(){screen="start";currentQ=0;answers={};render()} function goBack(){if(currentQ===0)return;currentQ-=1;render()} function selectChoice(typeId){answers[questions[currentQ].id]=typeId;if(currentQ===questions.length-1){screen="result"}else{currentQ+=1}render()}
window.startQuiz = startQuiz;
window.restart = restart;
window.goBack = goBack;
window.selectChoice = selectChoice;
window.copyLineMessage = copyLineMessage;
render();
</script>
</body>
</html>
